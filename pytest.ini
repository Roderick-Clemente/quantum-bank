[pytest]
testpaths = test
pythonpath = .
python_files = test_*.py
python_functions = test_*

# Local coverage gate (app + api + models + split_config). Fast runs: pytest --no-cov
addopts =
    --cov=app
    --cov=api
    --cov=models
    --cov=split_config
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-fail-under=90

markers =
    public: unauthenticated pages, static routes, and health-style endpoints
    banking: login session, dashboard, and authenticated banking pages
    api: JSON endpoints under /api/
    models: subprocess or DB bootstrap tests (run before app client tests)
