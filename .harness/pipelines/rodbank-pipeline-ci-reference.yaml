# Reference: rod-bank-pipeline (Harness inline). Org=sandbox, project=devX_super_team.
# Test step: pytest -> out_report.xml + JUnit reports for Harness Tests tab.

pipeline:
  name: rod-bank-pipeline
  identifier: rodbankpipeline
  projectIdentifier: devX_super_team
  orgIdentifier: sandbox
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: quantumplatformdemo
        repoName: quantum-bank
        build: <+input>
        sparseCheckout: []
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Test
                  name: Test_Intelligence
                  identifier: Test_Intelligence
                  spec:
                    shell: Sh
                    command: |-
                      pip install -r requirements.txt
                      pytest test/ -v --junit-xml=out_report.xml
                    intelligenceMode: true
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - out_report.xml
              - stepGroup:
                  name: SCA
                  identifier: SCA
                  steps:
                    - parallel:
                        - step:
                            type: Owasp
                            name: Owasp
                            identifier: Owasp
                            spec:
                              mode: orchestration
                              config: default
                              target:
                                type: repository
                                detection: auto
                              advanced:
                                log:
                                  level: info
                        - step:
                            type: OsvScanner
                            name: OsvScanner
                            identifier: OsvScanner
                            spec:
                              mode: orchestration
                              config: default
                              target:
                                type: repository
                                detection: auto
                              advanced:
                                log:
                                  level: info
        failureStrategies:
          - onFailure:
              errors: []
              action:
                type: MarkAsSuccess
